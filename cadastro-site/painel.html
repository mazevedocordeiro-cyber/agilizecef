<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Administrativo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6fb;
}

.topo{
  background:#1f3c88;
  color:white;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.area-busca{
  padding:20px;
  text-align:center;
}

.area-busca input{
  padding:10px 20px;
  border-radius:20px;
  border:1px solid #ccc;
}

.container{
  width:95%;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.info{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.bloco{
  background:#eef2f8;
  padding:8px 12px;
  border-radius:8px;
}

.acoes{
  display:flex;
  gap:8px;
}

.btn{
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

.copy{ background:#4CAF50; color:white; }
.print{ background:#2196F3; color:white; }
.pdf{ background:#FF5722; color:white; }
</style>
</head>
<body>

<div class="topo">
  Painel Administrativo
  <button onclick="sair()">Sair</button>
</div>

<div class="area-busca">
  <input type="text" id="buscaNome" placeholder="Buscar por nome...">
</div>

<div class="container" id="lista"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module" src="painel.js"></script>

</body>
</html>
