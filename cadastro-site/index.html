<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sistema de Cadastro</title>
  <meta name="description" content="Sistema de cadastro integrado com Firebase">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header id="topo">
    <div class="header-container">
      <h1 class="titulo-site">Cadastro do Proponente</h1>
      <p class="subtitulo-site"></p>
    </div>
  </header>
  <!-- ========================================== -->

  <!-- ================= MAIN =================== -->
  <main id="conteudo-principal">
    <section class="secao-cadastro">
      <div class="bloco-formulario">

        <form id="formCadastro" autocomplete="off" novalidate>

          <div class="form-header">
            <h2>Cadastro de Usuário</h2>
            <p></p>
          </div>

          <!-- ====== NOME ====== -->
          <div class="campo">
            <label for="nome"></label>
            <input 
              type="text" 
              id="nome" 
              name="nome" 
              placeholder="Digite seu nome completo" 
              required
            >
          </div>

          <!-- ====== CPF ====== -->
          <div class="campo">
            <label for="cpf"></label>
            <input 
              type="text" 
              id="cpf" 
              name="cpf" 
              placeholder="CPF" 
              maxlength="11" 
              required
            >
          </div>

          <!-- ====== TELEFONE ====== -->
          <div class="campo">
            <label for="telefone"></label>
            <input 
              type="text" 
              id="telefone" 
              name="telefone" 
              placeholder="DDD + número" 
              maxlength="11" 
              required
            >
          </div>

          <!-- ====== DATA ====== -->
          <div class="campo">
            <label for="data"></label>
            <input 
              type="text" 
              id="data" 
              name="data" 
              placeholder="DD/MM/AAAA" 
              maxlength="10" 
              required
            >
          </div>

          <!-- ====== BOTÃO ====== -->
          <div class="campo-botao">
            <button type="submit" id="btnCadastrar">
              Cadastrar
            </button>
          </div>

          <!-- ====== MENSAGEM ====== -->
          <div class="campo-mensagem">
            <div id="mensagem" class="mensagem-sucesso hidden">
              Cadastro realizado com sucesso!
            </div>
          </div>

        </form>

      </div>
    </section>
  </main>
  <!-- ========================================== -->

  <!-- ================= FOOTER ================= -->
  <footer id="rodape">
    <div class="footer-container">

      <div class="footer-info">
        <p></p>
        <p></p>
      </div>

      <div class="footer-links">
        <a href="admin.html" class="link-admin">
          Entrar como administrador
        </a>
      </div>

    </div>
  </footer>
  <!-- ========================================== -->

  <!-- ================= SCRIPTS ================ -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="script.js"></script>
  <!-- ========================================== -->

</body>
</html>
