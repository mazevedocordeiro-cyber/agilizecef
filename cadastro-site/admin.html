<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Administrador</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #0b3a86, #1565c0);
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(90deg, #002f6c, #0d47a1);
      padding: 15px 40px;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      background: white;
      width: 350px;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
      text-align: center;
    }

    .login-card h2 {
      margin-bottom: 25px;
      color: #0d47a1;
    }

    .login-card input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(90deg, #0d47a1, #1976d2);
      color: white;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-card button:hover {
      opacity: 0.9;
    }

    footer {
      background: linear-gradient(90deg, #002f6c, #0d47a1);
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<header>
  Agilize | Caixa Aqui
</header>

<main>
  <div class="login-card">
    <h2>Login do Admin</h2>

    <form id="formLogin">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="senha" placeholder="Senha" required>
      <button type="submit">Entrar</button>
      <button type="button" onclick="voltar()">Voltar</button>
    </form>
  </div>
</main>

<footer>
  @agilizecaixaaqui | Todos os Direitos Reservados | 2026
</footer>

<script type="module" src="firebase.js"></script>
<script type="module" src="admin.js"></script>

</body>
</html>
